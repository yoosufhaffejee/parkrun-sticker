<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>parkrun Overlay Sticker</title>

  <style>
    :root {
      --ui-bg: #f4f4f4;
      --ui-border: #d7d7d7;
      --ui-text: #111;
      --ui-muted: #666;
    }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 28px;
      background: var(--ui-bg);
      color: var(--ui-text);
    }

    h2 { margin: 0 0 12px; }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 12px;
    }

    input, button, select {
      padding: 10px 12px;
      font-size: 16px;
      border-radius: 12px;
      border: 1px solid var(--ui-border);
      background: #fff;
    }

    input { min-width: 240px; }

    button { cursor: pointer; font-weight: 600; }

    .hint {
      margin-top: 10px;
      font-size: 13px;
      color: var(--ui-muted);
      line-height: 1.45;
    }

    canvas {
      margin-top: 16px;
      border: 1px dashed #c9c9c9;
      border-radius: 12px;
      background: transparent;
      max-width: 100%;
      height: auto;
    }

    code {
      background: rgba(0,0,0,0.06);
      padding: 2px 6px;
      border-radius: 8px;
    }
  </style>
</head>

<body>
  <h2>parkrun Overlay Sticker</h2>

  <div class="row">
    <input id="timeInput" placeholder="Time (e.g. 32m 21s or 32:21)" />
    <select id="themeSelect" title="Export color theme">
      <option value="parkrunPurple" selected>parkrun Purple</option>
      <option value="white">White (dark photos)</option>
      <option value="black">Black (light photos)</option>
      <option value="vitalityPink">Vitality Pink</option>
    </select>
    <button id="btnDownload">Download PNG</button>
  </div>

  <div class="hint">
    Output is a transparent PNG overlay sticker (1200×628).<br/>
    Uses <code>parkrun-logo.svg</code> if present (best: crisp + recolor), otherwise <code>parkrun-logo.png</code>.
  </div>

  <canvas id="canvas" width="1200" height="628"></canvas>

  <script>
    // --- Fixed output size (overlay sticker) ---
    const CANVAS_W = 1200;
    const CANVAS_H = 628;
    const DISTANCE_KM = 5;

    // --- Compact layout tuned to match your preferred “tight” version ---
    // Key differences vs the spread-out version:
    // - Smaller left/right gap
    // - Smaller label text
    // - Values closer together
    // - Divider shorter and tighter
    const LAYOUT = {
      logoTopY: 96,
      logoTargetW: 520,          // larger logo like your preferred image
      afterLogoGapY: 28,         // tight spacing below logo
      labelsFontPx: 26,
      labelsOpacity: 0.85,
      valuesFontPx: 76,
      gapFromCenterX: 205,       // COMPACT (this was the biggest “spread” culprit)
      labelsToValuesY: 60,
      dividerWidth: 5,
      dividerOpacity: 0.28,
      dividerTopPad: 14,
      dividerBottomPad: 22,
    };

    const THEMES = {
      parkrunPurple: { ink: "#2b2441" },
      white: { ink: "#ffffff" },
      black: { ink: "#111111" },
      vitalityPink: { ink: "#e6007e" }
    };

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const timeInput = document.getElementById("timeInput");
    const themeSelect = document.getElementById("themeSelect");
    const btnDownload = document.getElementById("btnDownload");

    canvas.width = CANVAS_W;
    canvas.height = CANVAS_H;

    // --- Logo handling ---
    // Prefer SVG for crisp scaling + recolor. Fall back to PNG.
    const logoImg = new Image();
    let logoReady = false;
    let logoMode = "none"; // "svg" | "png" | "none"
    let svgTextCache = null;
    let currentLogoUrl = null;

    function getInk() {
      return (THEMES[themeSelect.value] || THEMES.parkrunPurple).ink;
    }

    function defaultTime() {
      return "00m 00s";
    }

    function getTimeText() {
      const v = (timeInput.value || "").trim();
      return v.length > 0 ? v : defaultTime();
    }

    function revokeLogoUrlIfNeeded() {
      if (currentLogoUrl && currentLogoUrl.startsWith("blob:")) {
        URL.revokeObjectURL(currentLogoUrl);
      }
      currentLogoUrl = null;
    }

    // Replace the seeklogo colors so the entire logo becomes the theme color.
    // Your SVG contains fills like #2B233D and a gradient; we unify to a single color.
    function recolorSvgToInk(svgText, ink) {
      let s = svgText;

      // Replace known colors in your SVG
      s = s.replaceAll("#2B233D", ink);
      s = s.replaceAll("#2b233d", ink);

      // Replace gradient fill with ink (turn it into solid)
      s = s.replaceAll('fill="url(#full_1_)"', `fill="${ink}"`);

      // Replace any remaining white fills to ink as well (so it works in white theme too)
      s = s.replaceAll('fill="#FFFFFF"', `fill="${ink}"`);
      s = s.replaceAll('fill="#ffffff"', `fill="${ink}"`);

      // Also update any stop-colors if they exist
      s = s.replaceAll("stop-color:#2B233D", `stop-color:${ink}`);
      s = s.replaceAll("stop-color:#2b233d", `stop-color:${ink}`);

      return s;
    }

    async function loadLogoForTheme() {
      const ink = getInk();

      // Try SVG first (best)
      try {
        if (!svgTextCache) {
          const res = await fetch("parkrun-seeklogo.svg", { cache: "no-store" });
          if (!res.ok) throw new Error("SVG not found");
          svgTextCache = await res.text();
        }

        const recolored = recolorSvgToInk(svgTextCache, ink);
        const blob = new Blob([recolored], { type: "image/svg+xml" });

        revokeLogoUrlIfNeeded();
        currentLogoUrl = URL.createObjectURL(blob);

        await new Promise((resolve, reject) => {
          logoReady = false;
          logoImg.onload = () => { logoReady = true; logoMode = "svg"; resolve(); };
          logoImg.onerror = reject;
          logoImg.src = currentLogoUrl;
        });

        render();
        return;
      } catch {
        // fall through to PNG
      }

      // Fallback PNG
      try {
        revokeLogoUrlIfNeeded();
        await new Promise((resolve, reject) => {
          logoReady = false;
          logoImg.onload = () => { logoReady = true; logoMode = "png"; resolve(); };
          logoImg.onerror = reject;
          logoImg.src = "parkrun-logo.png";
        });
      } catch {
        logoReady = false;
        logoMode = "none";
      }

      render();
    }

    // Auto-crop transparent padding from rasterized image (works for PNG and browser-rasterized SVG)
    function drawLogoCenteredCropped(_ctx, img, centerX, topY, targetWidth) {
      if (!img.width || !img.height) return 0;

      const t = document.createElement("canvas");
      const tctx = t.getContext("2d", { willReadFrequently: true });

      t.width = img.width;
      t.height = img.height;
      tctx.clearRect(0, 0, t.width, t.height);
      tctx.drawImage(img, 0, 0);

      const imageData = tctx.getImageData(0, 0, img.width, img.height);
      const data = imageData.data;

      let minX = img.width, minY = img.height, maxX = -1, maxY = -1;

      for (let y = 0; y < img.height; y++) {
        for (let x = 0; x < img.width; x++) {
          const a = data[(y * img.width + x) * 4 + 3];
          if (a > 0) {
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x > maxX) maxX = x;
            if (y > maxY) maxY = y;
          }
        }
      }

      if (maxX < 0 || maxY < 0) return 0;

      const croppedW = (maxX - minX) + 1;
      const croppedH = (maxY - minY) + 1;

      const scale = targetWidth / croppedW;
      const drawH = croppedH * scale;

      _ctx.drawImage(
        img,
        minX, minY, croppedW, croppedH,
        centerX - targetWidth / 2,
        topY,
        targetWidth,
        drawH
      );

      return drawH;
    }

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const ink = getInk();
      const centerX = canvas.width / 2;

      // Draw logo
      let logoH = 0;
      if (logoReady) {
        logoH = drawLogoCenteredCropped(ctx, logoImg, centerX, LAYOUT.logoTopY, LAYOUT.logoTargetW);
      } else {
        // Fallback plain text if no assets available
        ctx.fillStyle = ink;
        ctx.textAlign = "center";
        ctx.font = "700 96px system-ui, -apple-system, Segoe UI, Roboto, Arial";
        ctx.fillText("parkrun", centerX, LAYOUT.logoTopY + 110);
        logoH = 130;
      }

      // Tight vertical spacing under logo
      const labelsY = LAYOUT.logoTopY + logoH + LAYOUT.afterLogoGapY;
      const valuesY = labelsY + LAYOUT.labelsToValuesY;

      const gapX = LAYOUT.gapFromCenterX;

      // Labels
      ctx.fillStyle = ink;
      ctx.textAlign = "center";
      ctx.globalAlpha = LAYOUT.labelsOpacity;
      ctx.font = `700 ${LAYOUT.labelsFontPx}px system-ui, -apple-system, Segoe UI, Roboto, Arial`;
      ctx.fillText("TIME", centerX - gapX, labelsY);
      ctx.fillText("DISTANCE", centerX + gapX, labelsY);

      // Values
      ctx.globalAlpha = 1;
      ctx.font = `800 ${LAYOUT.valuesFontPx}px system-ui, -apple-system, Segoe UI, Roboto, Arial`;
      ctx.fillText(getTimeText(), centerX - gapX, valuesY);
      ctx.fillText(`${DISTANCE_KM} km`, centerX + gapX, valuesY);

      // Divider (shorter + tighter)
      ctx.globalAlpha = LAYOUT.dividerOpacity;
      ctx.strokeStyle = ink;
      ctx.lineWidth = LAYOUT.dividerWidth;
      ctx.beginPath();
      ctx.moveTo(centerX, labelsY - LAYOUT.dividerTopPad);
      ctx.lineTo(centerX, valuesY + LAYOUT.dividerBottomPad);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    function download() {
      const a = document.createElement("a");
      a.download = `parkrun-overlay-${themeSelect.value}.png`;
      a.href = canvas.toDataURL("image/png");
      a.click();
    }

    // Live updates
    timeInput.addEventListener("input", render);

    // Recolor logo when theme changes (SVG only; PNG stays as-is)
    themeSelect.addEventListener("change", () => {
      loadLogoForTheme();
    });

    btnDownload.addEventListener("click", download);

    // Init
    timeInput.value = "";
    render();
    loadLogoForTheme();
  </script>
</body>
</html>
