<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>parkrun Overlay Sticker</title>

  <style>
    :root { --ui-bg:#f4f4f4; --ui-border:#d7d7d7; --ui-text:#111; --ui-muted:#666; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 28px; background: var(--ui-bg); color: var(--ui-text); }
    h2 { margin: 0 0 12px; }
    .row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-top:12px; }
    input, button, select { padding:10px 12px; font-size:16px; border-radius:12px; border:1px solid var(--ui-border); background:#fff; }
    input[type="color"] { padding: 0; width: 44px; height: 44px; border-radius: 12px; }
    input[type="text"] { min-width: 240px; }
    button { cursor:pointer; font-weight:600; }
    .hint { margin-top:10px; font-size:13px; color: var(--ui-muted); line-height:1.45; }
    .small { margin-top:8px; font-size:12px; color: var(--ui-muted); }
    canvas { margin-top:16px; border:1px dashed #c9c9c9; border-radius:12px; background:transparent; max-width:100%; height:auto; }
    code { background: rgba(0,0,0,0.06); padding:2px 6px; border-radius:8px; }
    .group { display:flex; align-items:center; gap:10px; }
    .groupLabel { font-size: 13px; color: var(--ui-muted); width: 80px; }
    .pill { font-size: 12px; color: var(--ui-muted); padding: 6px 10px; border: 1px solid var(--ui-border); border-radius: 999px; background:#fff; }
  </style>
</head>

<body>
  <h2>parkrun Overlay Sticker</h2>

  <div class="row">
    <input id="timeInput" type="text" placeholder="Time (e.g. 32m 21s or 32:21)" />
    <button id="btnDownload">Download PNG</button>
    <span class="pill">Distance fixed: 5 km</span>
  </div>

  <div class="row">
    <div class="group">
      <span class="groupLabel">Logo</span>
      <select id="logoPreset">
        <option value="parkrunPurple" selected>parkrun Purple</option>
        <option value="white">White</option>
        <option value="black">Black</option>
        <option value="vitalityPink">Vitality Pink</option>
        <option value="custom">Custom…</option>
      </select>
      <input id="logoColor" type="color" value="#2b2441" title="Logo custom color" />
    </div>

    <div class="group">
      <span class="groupLabel">Info</span>
      <select id="infoPreset">
        <option value="parkrunPurple" selected>parkrun Purple</option>
        <option value="white">White</option>
        <option value="black">Black</option>
        <option value="vitalityPink">Vitality Pink</option>
        <option value="custom">Custom…</option>
      </select>
      <input id="infoColor" type="color" value="#2b2441" title="Info custom color" />
    </div>
  </div>

  <div class="hint">
    Files supported (same folder): <code>parkrun-logo.svg</code> → <code>parkrun-logo.png</code> → <code>parkrun-logo-320.png</code>.<br/>
    SVG recolors perfectly. PNGs will be tinted for the logo color.
  </div>

  <div class="small" id="status"></div>

  <canvas id="canvas" width="1200" height="628"></canvas>

  <script>
    const CANVAS_W = 1200;
    const CANVAS_H = 628;
    const DISTANCE_KM = 5;

    // Layout tuned: bring time/distance closer + more balanced left/right
    const LAYOUT = {
      logoTopY: 86,
      logoTargetW: 560,
      afterLogoGapY: 26,

      labelsFontPx: 26,
      labelsOpacity: 0.85,
      valuesFontPx: 76,
      labelsToValuesY: 60,

      // Was 205. Tighten further + keep symmetry.
      gapFromCenterX: 170,

      dividerWidth: 5,
      dividerOpacity: 0.28,
      dividerTopPad: 14,
      dividerBottomPad: 22
    };

    const PRESETS = {
      parkrunPurple: "#2b2441",
      white: "#ffffff",
      black: "#111111",
      vitalityPink: "#e6007e"
    };

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const timeInput = document.getElementById("timeInput");
    const btnDownload = document.getElementById("btnDownload");
    const statusEl = document.getElementById("status");

    const logoPreset = document.getElementById("logoPreset");
    const infoPreset = document.getElementById("infoPreset");
    const logoColor = document.getElementById("logoColor");
    const infoColor = document.getElementById("infoColor");

    canvas.width = CANVAS_W;
    canvas.height = CANVAS_H;

    function setStatus(msg) { statusEl.textContent = msg; }

    function getTimeText() {
      const v = (timeInput.value || "").trim();
      return v.length > 0 ? v : "00m 00s";
    }

    function resolveColor(presetEl, colorEl) {
      const key = presetEl.value;
      if (key === "custom") return colorEl.value;
      return PRESETS[key] || colorEl.value;
    }

    function getLogoInk() { return resolveColor(logoPreset, logoColor); }
    function getInfoInk() { return resolveColor(infoPreset, infoColor); }

    // Keep picker synced when preset selected
    function syncPickerFromPreset(presetEl, colorEl) {
      const key = presetEl.value;
      if (key !== "custom" && PRESETS[key]) {
        colorEl.value = PRESETS[key];
      }
    }

    // ---- Logo state ----
    const logoImg = new Image();
    let logoReady = false;
    let logoMode = "none"; // "svg-recolor" | "svg-direct" | "png" | "none"
    let blobUrl = null;

    function revokeBlobUrl() {
      if (blobUrl && blobUrl.startsWith("blob:")) {
        URL.revokeObjectURL(blobUrl);
      }
      blobUrl = null;
    }

    function recolorSvgToInk(svgText, ink) {
      let s = svgText;

      s = s.replace(/fill="[^"]*"/gi, `fill="${ink}"`);
      s = s.replace(/stroke="[^"]*"/gi, `stroke="${ink}"`);
      s = s.replace(/fill\s*:\s*[^;"]+/gi, `fill:${ink}`);
      s = s.replace(/stroke\s*:\s*[^;"]+/gi, `stroke:${ink}`);
      s = s.replace(/fill="url\(#.+?\)"/gi, `fill="${ink}"`);
      s = s.replace(/stop-color\s*:\s*[^;"]+/gi, `stop-color:${ink}`);
      s = s.replace(/stop-color="[^"]*"/gi, `stop-color="${ink}"`);

      return s;
    }

    async function loadSvgRecolored(url, ink) {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error("SVG fetch failed");
      const svgText = await res.text();

      const recolored = recolorSvgToInk(svgText, ink);
      const blob = new Blob([recolored], { type: "image/svg+xml" });

      revokeBlobUrl();
      blobUrl = URL.createObjectURL(blob);

      await new Promise((resolve, reject) => {
        logoReady = false;
        logoImg.onload = () => { logoReady = true; resolve(); };
        logoImg.onerror = reject;
        logoImg.src = blobUrl;
      });

      logoMode = "svg-recolor";
      setStatus(`Logo: ${url} (recolored)`);
    }

    async function loadDirect(url, modeLabel) {
      await new Promise((resolve, reject) => {
        logoReady = false;
        logoImg.onload = () => { logoReady = true; resolve(); };
        logoImg.onerror = reject;
        logoImg.src = url;
      });

      logoMode = modeLabel;
      setStatus(`Logo: ${url} (${modeLabel})`);
    }

    async function ensureLogoLoaded() {
      const logoInk = getLogoInk();

      // 1) SVG recolor (best)
      try { await loadSvgRecolored("parkrun-logo.svg", logoInk); return; } catch {}

      // 2) SVG direct (shows something if recolor pipeline fails)
      try { await loadDirect("parkrun-logo.svg", "svg-direct"); return; } catch {}

      // 3) PNG hi-res
      try { await loadDirect("parkrun-logo.png", "png"); return; } catch {}

      // 4) PNG old square
      try { await loadDirect("parkrun-logo-320.png", "png"); return; } catch {}

      logoReady = false;
      logoMode = "none";
      setStatus("Logo: not found");
    }

    // Rasterize to temp canvas, crop, then draw centered (robust for SVGs)
    function drawLogoRasterCropCentered(_ctx, img, centerX, topY, targetW, tintColorOrNull) {
      const rasterW = 1600;
      const rasterH = 900;

      const t = document.createElement("canvas");
      t.width = rasterW;
      t.height = rasterH;
      const tctx = t.getContext("2d", { willReadFrequently: true });

      tctx.clearRect(0, 0, rasterW, rasterH);

      const srcW = img.naturalWidth || img.width || 1;
      const srcH = img.naturalHeight || img.height || 1;

      const scale = Math.min(rasterW / srcW, rasterH / srcH);
      const drawW = srcW * scale;
      const drawH = srcH * scale;
      const drawX = (rasterW - drawW) / 2;
      const drawY = (rasterH - drawH) / 2;

      tctx.drawImage(img, drawX, drawY, drawW, drawH);

      if (tintColorOrNull) {
        tctx.globalCompositeOperation = "source-in";
        tctx.fillStyle = tintColorOrNull;
        tctx.fillRect(0, 0, rasterW, rasterH);
        tctx.globalCompositeOperation = "source-over";
      }

      let minX = rasterW, minY = rasterH, maxX = -1, maxY = -1;

      try {
        const imageData = tctx.getImageData(0, 0, rasterW, rasterH);
        const data = imageData.data;

        for (let y = 0; y < rasterH; y++) {
          for (let x = 0; x < rasterW; x++) {
            const a = data[(y * rasterW + x) * 4 + 3];
            if (a > 0) {
              if (x < minX) minX = x;
              if (y < minY) minY = y;
              if (x > maxX) maxX = x;
              if (y > maxY) maxY = y;
            }
          }
        }
      } catch {
        const fallbackH = targetW * (drawH / drawW);
        _ctx.drawImage(t, centerX - targetW / 2, topY, targetW, fallbackH);
        return fallbackH;
      }

      if (maxX < 0 || maxY < 0) return 0;

      const croppedW = (maxX - minX) + 1;
      const croppedH = (maxY - minY) + 1;

      const outScale = targetW / croppedW;
      const outH = croppedH * outScale;

      _ctx.drawImage(
        t,
        minX, minY, croppedW, croppedH,
        centerX - targetW / 2,
        topY,
        targetW,
        outH
      );

      return outH;
    }

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const logoInk = getLogoInk();
      const infoInk = getInfoInk();
      const centerX = canvas.width / 2;

      let logoH = 0;

      if (logoReady) {
        // If we fell back to PNG and logo ink is not the original, tint it
        const shouldTint = (logoMode === "png" && logoInk.toLowerCase() !== PRESETS.parkrunPurple);
        logoH = drawLogoRasterCropCentered(ctx, logoImg, centerX, LAYOUT.logoTopY, LAYOUT.logoTargetW, shouldTint ? logoInk : null);
      } else {
        ctx.fillStyle = logoInk;
        ctx.textAlign = "center";
        ctx.font = "700 96px system-ui, -apple-system, Segoe UI, Roboto, Arial";
        ctx.fillText("parkrun", centerX, LAYOUT.logoTopY + 110);
        logoH = 130;
      }

      const labelsY = LAYOUT.logoTopY + logoH + LAYOUT.afterLogoGapY;
      const valuesY = labelsY + LAYOUT.labelsToValuesY;

      // Balanced close-to-center blocks
      const gapX = LAYOUT.gapFromCenterX;

      ctx.fillStyle = infoInk;
      ctx.textAlign = "center";

      ctx.globalAlpha = LAYOUT.labelsOpacity;
      ctx.font = `700 ${LAYOUT.labelsFontPx}px system-ui, -apple-system, Segoe UI, Roboto, Arial`;
      ctx.fillText("TIME", centerX - gapX, labelsY);
      ctx.fillText("DISTANCE", centerX + gapX, labelsY);

      ctx.globalAlpha = 1;
      ctx.font = `800 ${LAYOUT.valuesFontPx}px system-ui, -apple-system, Segoe UI, Roboto, Arial`;
      ctx.fillText(getTimeText(), centerX - gapX, valuesY);
      ctx.fillText(`${DISTANCE_KM} km`, centerX + gapX, valuesY);

      ctx.globalAlpha = LAYOUT.dividerOpacity;
      ctx.strokeStyle = infoInk;
      ctx.lineWidth = LAYOUT.dividerWidth;
      ctx.beginPath();
      ctx.moveTo(centerX, labelsY - LAYOUT.dividerTopPad);
      ctx.lineTo(centerX, valuesY + LAYOUT.dividerBottomPad);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    function download() {
      const a = document.createElement("a");
      a.download = `parkrun-overlay-logo_${logoPreset.value}-info_${infoPreset.value}.png`;
      a.href = canvas.toDataURL("image/png");
      a.click();
    }

    // Events
    timeInput.addEventListener("input", render);

    logoPreset.addEventListener("change", async () => {
      syncPickerFromPreset(logoPreset, logoColor);
      await ensureLogoLoaded(); // reload recolored svg if used
      render();
    });

    infoPreset.addEventListener("change", () => {
      syncPickerFromPreset(infoPreset, infoColor);
      render();
    });

    logoColor.addEventListener("input", async () => {
      logoPreset.value = "custom";
      await ensureLogoLoaded();
      render();
    });

    infoColor.addEventListener("input", () => {
      infoPreset.value = "custom";
      render();
    });

    btnDownload.addEventListener("click", download);

    // Init defaults
    timeInput.value = "";
    syncPickerFromPreset(logoPreset, logoColor);
    syncPickerFromPreset(infoPreset, infoColor);

    (async () => {
      await ensureLogoLoaded();
      render();
    })();
  </script>
</body>
</html>
